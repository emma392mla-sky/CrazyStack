<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance - crazy stack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Gears Container */
        .gears-wrapper {
            margin-bottom: 35px;
            position: relative;
            width: 200px;
            height: 150px;
            margin-left: auto;
            margin-right: auto;
        }

        .gear {
            position: absolute;
            font-size: 80px;
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.3));
        }

        .gear-1 {
            left: 20px;
            top: 10px;
            animation: rotateClockwise 3s linear infinite;
        }

        .gear-2 {
            right: 20px;
            top: 25px;
            font-size: 65px;
            animation: rotateCounterClockwise 2.5s linear infinite;
        }

        .gear-3 {
            left: 70px;
            bottom: -5px;
            font-size: 50px;
            opacity: 0.8;
            animation: rotateClockwise 2s linear infinite;
        }

        @keyframes rotateClockwise {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes rotateCounterClockwise {
            from {
                transform: rotate(360deg);
            }
            to {
                transform: rotate(0deg);
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 30px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .sub-text {
            margin-top: 25px;
            font-size: 1rem;
            opacity: 0.8;
            font-style: italic;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 14s; }
        .particle:nth-child(3) { left: 40%; animation-delay: 4s; animation-duration: 16s; }
        .particle:nth-child(4) { left: 60%; animation-delay: 6s; animation-duration: 13s; }
        .particle:nth-child(5) { left: 80%; animation-delay: 8s; animation-duration: 15s; }
        .particle:nth-child(6) { left: 90%; animation-delay: 10s; animation-duration: 17s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            .message {
                font-size: 1.1rem;
            }
            .brand {
                font-size: 1.4rem;
            }
            .gears-wrapper {
                width: 160px;
                height: 120px;
            }
            .gear {
                font-size: 60px;
            }
            .gear-2 {
                font-size: 50px;
            }
            .gear-3 {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Rotating Gears Animation -->
        <div class="gears-wrapper">
            <div class="gear gear-1">⚙️</div>
            <div class="gear gear-2">⚙️</div>
            <div class="gear gear-3">⚙️</div>
        </div>

        <h1>Sorry for the Inconvenience</h1>
        
        <p class="message">
            We are currently fixing something and performing scheduled maintenance. 
            We'll be back online shortly!
        </p>

        <div class="brand">crazy stack</div>

        <p class="sub-text">Thank you for your patience ✨</p>
    </div>

    <script>
        // Optional: Add console message for developers
        console.log('Maintenance Mode Active - Site is temporarily offline');
    </script>
</body>
</html>
